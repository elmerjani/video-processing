spring.application.name=video-stream

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/videoprocessing}
spring.datasource.username=${DATABASE_USERNAME:video_app}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=${DATABASE_SCHEMA:public}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${COGNITO_ISSUER_URI}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.default-schema=${DATABASE_SCHEMA:public}
spring.flyway.schemas=${DATABASE_SCHEMA:public}

app.aws.region=${AWS_REGION:us-east-1}
app.aws.videos-bucket=${VIDEO_BUCKET:video-processing-local}
app.aws.upload-url-expiration-minutes=${UPLOAD_URL_EXPIRATION_MINUTES:15}
app.aws.cognito-client-id=${COGNITO_CLIENT_ID}

app.upload.max-file-bytes=${MAX_UPLOAD_FILE_BYTES:524288000}
app.upload.max-active-jobs=${MAX_ACTIVE_VIDEO_JOBS:3}
app.upload.max-daily-jobs=${MAX_DAILY_VIDEO_JOBS:20}
app.upload.max-daily-bytes=${MAX_DAILY_UPLOAD_BYTES:5368709120}

app.database.secret-arn=${DATABASE_SECRET_ARN:}
app.database.host=${DATABASE_HOST:}
app.database.port=${DATABASE_PORT:5432}
app.database.name=${DATABASE_NAME:videoprocessing}
app.database.sslmode=${DATABASE_SSLMODE:require}

management.endpoints.web.exposure.include=health,info
